name: API Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: 拉代码
        uses: actions/checkout@v3

      - name: 装Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 装依赖
        run: pip install -r requirements.txt

      - name: 启动Flask后厨
        run: |
          python app.py &
          sleep 3

      - name: 考官上场
        run: pytest -v --tb=short
        env:
          PYTHONPATH: ${{ github.workspace }}
